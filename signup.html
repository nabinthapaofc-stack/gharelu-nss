<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your Gharelu account and start booking trusted household service workers today." />
  <title>Sign Up — Gharelu</title>
  <link rel="icon" type="image/png" href="assets/logofinal.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="auth-body">

  <!-- ── NAVBAR ───────────────────────────────────────── -->
  <header>
    <nav role="navigation" aria-label="Main navigation">
      <a href="index.html" class="nav-logo" aria-label="Gharelu — home">
        <span class="nav-logo-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <polyline points="3 12 12 4 21 12" />
          </svg>
        </span>
        <span class="nav-logo-word">Ghare<em>lu</em></span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="login.html" class="nav-cta">Login</a></li>
      </ul>
    </nav>
  </header>

  <!-- ── AUTH WRAPPER ───────────────────────────────────── -->
  <main class="auth-main auth-main--signup">

    <!-- Decorative background blobs -->
    <div class="auth-blob ab1" aria-hidden="true"></div>
    <div class="auth-blob ab2" aria-hidden="true"></div>

    <div class="auth-card fu d1">

      <!-- Logo mark -->
      <div class="auth-logo-wrap">
        <div class="auth-logo-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <polyline points="3 12 12 4 21 12" />
          </svg>
        </div>
        <div class="auth-logo-text">
          <span class="auth-brand">Ghare<em>lu</em></span>
          <span class="auth-tagline">Your Home, Our Priority</span>
        </div>
      </div>

      <h1 class="auth-title">Create your account</h1>
      <p class="auth-sub">Join Gharelu — it's 100% free to get started</p>

      <form class="auth-form" action="dashboard.html" method="get" novalidate>

        <!-- Full Name -->
        <div class="form-group">
          <label for="signup-name" class="form-label">Full Name</label>
          <div class="input-wrap">
            <span class="input-icon" aria-hidden="true"><svg class="svg-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></span>
            <input
              id="signup-name"
              type="text"
              name="fullname"
              class="form-input"
              placeholder="Nabin Bikram Thapa"
              required
              autocomplete="name"
            />
          </div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="signup-email" class="form-label">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon" aria-hidden="true"><svg class="svg-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg></span>
            <input
              id="signup-email"
              type="email"
              name="email"
              class="form-input"
              placeholder="you@example.com"
              required
              autocomplete="email"
            />
          </div>
        </div>

        <!-- Phone -->
        <div class="form-group">
          <label for="signup-phone" class="form-label">Phone Number</label>
          <div class="input-wrap">
            <span class="input-icon" aria-hidden="true"><svg class="svg-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg></span>
            <input
              id="signup-phone"
              type="tel"
              name="phone"
              class="form-input"
              placeholder="+977 98XXXXXXXX"
              required
              pattern="[+]?[0-9]{7,15}"
              autocomplete="tel"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="signup-password" class="form-label">Password</label>
          <div class="input-wrap pw-wrap">
            <input type="checkbox" id="pw-toggle-signup" class="pw-checkbox" aria-label="Show password" />
            <span class="input-icon" aria-hidden="true"><svg class="svg-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
            <input
              id="signup-password"
              type="password"
              name="password"
              class="form-input pw-field"
              placeholder="At least 8 characters"
              required
              minlength="8"
              autocomplete="new-password"
            />
            <label for="pw-toggle-signup" class="pw-toggle-label" title="Show / Hide password">
              <span class="pw-eye pw-eye-show" aria-hidden="true">👁️</span>
              <span class="pw-eye pw-eye-hide" aria-hidden="true">🙈</span>
            </label>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="signup-confirm" class="form-label">Confirm Password</label>
          <div class="input-wrap pw-wrap">
            <input type="checkbox" id="pw-toggle-confirm" class="pw-checkbox" aria-label="Show confirm password" />
            <span class="input-icon" aria-hidden="true"><svg class="svg-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
            <input
              id="signup-confirm"
              type="password"
              name="confirm_password"
              class="form-input pw-field"
              placeholder="Re-enter your password"
              required
              minlength="8"
              autocomplete="new-password"
            />
            <label for="pw-toggle-confirm" class="pw-toggle-label" title="Show / Hide password">
              <span class="pw-eye pw-eye-show" aria-hidden="true">👁️</span>
              <span class="pw-eye pw-eye-hide" aria-hidden="true">🙈</span>
            </label>
          </div>
        </div>

        <!-- Terms -->
        <div class="form-group">
          <label class="checkbox-label" for="terms">
            <input type="checkbox" id="terms" name="terms" required />
            <span class="checkbox-custom" aria-hidden="true"></span>
            <span>I agree to the <a href="#" class="inline-link">Terms &amp; Conditions</a> and <a href="#" class="inline-link">Privacy Policy</a></span>
          </label>
        </div>

        <!-- Submit -->
        <a href="dashboard.html" class="auth-btn" id="signup-submit" style="text-align:center;display:block;">Create My Account</a>

      </form>

      <p class="auth-switch">
        Already have an account?
        <a href="login.html" class="auth-switch-link">Log In</a>
      </p>

    </div>
  </main>

</body>
</html>
